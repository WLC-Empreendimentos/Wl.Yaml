# Gate principal de Pull Request.
#
# Jobs obrigatórios para merge (todos devem passar):
#   - typecheck    (typecheck.yml)
#   - lint         (lint.yml)
#   - jest         (jest.yml)
#   - editorconfig (editorconfig.yml)
#   - markdown     (markdown.yml)
#
# integracao é obrigatório somente após os testes de integração estarem estáveis.
# auto-aprovar executa após todos os checks passarem e aprova o PR via wlc-auto-approve.
# Consulte: docs/padronizacao/qualidade/CICD.md

name: PR

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  # --------------------------------------------------------------------------
  # Preflight — detecta o que existe e define outputs para os demais jobs
  # --------------------------------------------------------------------------
  preflight:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    outputs:
      tem_codigo:    ${{ steps.check.outputs.tem_codigo }}
      tem_testes:    ${{ steps.check.outputs.tem_testes }}
      tem_integracao: ${{ steps.check.outputs.tem_integracao }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        run: |
          set -euo pipefail

          if [ -f "package.json" ] && \
            [ -n "$(find src -maxdepth 5 -name '*.ts' 2>/dev/null | head -1)" ]; then
            echo "tem_codigo=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Sem código TypeScript — jobs de typecheck/lint serão ignorados."
            echo "tem_codigo=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -d "tests" ] && \
            [ -n "$(find tests -maxdepth 5 -name '*.test.ts' 2>/dev/null | head -1)" ]; then
            echo "tem_testes=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Sem testes unitários — job jest será ignorado."
            echo "tem_testes=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -d "tests/integracao" ] && \
            [ -n "$(find tests/integracao -maxdepth 5 -name '*.ts' 2>/dev/null | head -1)" ]; then
            echo "tem_integracao=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Sem testes de integração — job integracao será ignorado."
            echo "tem_integracao=false" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------------
  # Jobs de validação
  # --------------------------------------------------------------------------
  typecheck:
    needs: preflight
    if: needs.preflight.outputs.tem_codigo == 'true'
    uses: ./.github/workflows/typecheck.yml

  lint:
    needs: preflight
    if: needs.preflight.outputs.tem_codigo == 'true'
    uses: ./.github/workflows/lint.yml

  jest:
    needs: preflight
    if: needs.preflight.outputs.tem_testes == 'true'
    uses: ./.github/workflows/jest.yml

  integracao:
    needs: [preflight, jest]
    if: needs.preflight.outputs.tem_integracao == 'true'
    uses: ./.github/workflows/integracao.yml

  editorconfig:
    uses: ./.github/workflows/editorconfig.yml

  markdown:
    uses: ./.github/workflows/markdown.yml

  # --------------------------------------------------------------------------
  # Auto-aprovação — somente em pull_request do mantenedor, após todos os checks passarem
  # --------------------------------------------------------------------------
  auto-aprovar:
    needs: [preflight, typecheck, lint, jest, editorconfig, markdown]
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'cavalcante-willian' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Gerar token do wlc-auto-approve
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Aprovar PR
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --approve \
            --body "CI passou. Aprovação automática via wlc-auto-approve."

      - name: Mesclar PR
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --admin

  # --------------------------------------------------------------------------
  # Badges — somente em push na main, após todos os jobs
  # --------------------------------------------------------------------------
  publicar-badge-cicd:
    needs: [preflight, typecheck, lint, jest, editorconfig, markdown]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux]
    timeout-minutes: 5
    steps:
      - name: Atualizar badge CI/CD
        run: |
          [ -n "$GIST_TOKEN" ] && [ -n "$VSCODE_YAML_GIST_ID" ] || exit 0
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            COR="red"; MSG="failing"
          else
            COR="brightgreen"; MSG="passing"
          fi
          BODY=$(printf '{"schemaVersion":1,"label":"CI/CD","message":"%s","color":"%s"}' "$MSG" "$COR")
          PAYLOAD=$(jq -n --arg body "$BODY" '{files:{"wl-yaml-cicd.json":{content:$body}}}')
          curl -fsSL -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/gists/$VSCODE_YAML_GIST_ID" \
            -d "$PAYLOAD"
