# Verificação de tipos TypeScript sem emissão de arquivos.
# Chamado por: pr.yml

name: Typecheck

on:
  workflow_call:

permissions: read-all

jobs:
  typecheck:
    runs-on: [self-hosted, Linux]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências
        run: npm ci

      - name: Verificar tipos
        run: npx tsc --noEmit
